
services:
  db:
    image: postgres:16-alpine
    container_name: hellesidence_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: hellesidence_db
    ports:
      - "15433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d hellesidence_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: hellesidence_server
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://root:root@db:5432/hellesidence_db
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: hellesidence_client
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  pg_data:
